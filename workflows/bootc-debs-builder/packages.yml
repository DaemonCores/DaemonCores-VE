# Package manifest for the bootc .deb builder.
# One entry per package. Consumed by the generic bootc-debs-builder workflow
# (setup computes dependency waves) and by the build-one-deb reusable workflow.
#   name       logical package name
#   upstream   apt package to repack (omit for from-source / custom packages)
#   deps       packages that must be built+installed first (creates a wave)
#   sources    paths under workflows/bootc-debs-builder/ hashed for change
#   deb-glob   output deb glob when it differs from <name>_*
#   env        non-secret KEY: VALUE exported for the build (also hashed)
#   secret-env ENV_VAR: SECRET_NAME injected from secrets (never hashed)
#   build      the exact build script, verbatim
packages:
  - name: ifupdown2
    upstream: ifupdown2
    sources:
      - ifupdown2postinstall
    build: |
      SAVE_PWD=$(pwd)

      apt update
      cd /tmp
      apt-get download ifupdown2

      mkdir -p /output/ifupdown2
      dpkg-deb -R /tmp/ifupdown2_*.deb /output/ifupdown2

      ORIG_VER=$(dpkg-deb -f /tmp/ifupdown2_*.deb Version)

      cp -r "${SAVE_PWD}"/workflows/bootc-debs-builder/ifupdown2postinstall/* \
        /output/ifupdown2/

      # Regenerate md5sums after content modification
      find /output/ifupdown2 -not -path '*/DEBIAN/*' -type f \
        | xargs md5sum \
        | sed "s|/output/ifupdown2/||" \
        > /output/ifupdown2/DEBIAN/md5sums

      # Preserve +pmx suffix for pve-manager version check
      sed -i "s/^Version: .*/Version: 2:${ORIG_VER}+bootc5/" \
        /output/ifupdown2/DEBIAN/control
      chmod +x /output/ifupdown2/usr/sbin/ifupdown2-autoconf \
        /output/ifupdown2/usr/sbin/domain-set

      # Content check: version bumped and our helpers present + executable.
      grep -qF "Version: 2:${ORIG_VER}+bootc5" \
        /output/ifupdown2/DEBIAN/control \
        || { echo "ERROR: ifupdown2 version not rewritten" >&2; exit 1; }
      for s in ifupdown2-autoconf domain-set; do
        test -s "/output/ifupdown2/usr/sbin/${s}" \
          && test -x "/output/ifupdown2/usr/sbin/${s}" \
          || { echo "ERROR: ifupdown2 ${s} missing/not exec" >&2; exit 1; }
      done

      dpkg-deb --build /output/ifupdown2 \
        /debs/ifupdown2_${ORIG_VER}+bootc5_all.deb

  - name: chrony
    upstream: chrony
    sources:
      - chronypostinstall
    build: |
      SAVE_PWD=$(pwd)

      apt update
      cd /tmp
      apt-get download chrony

      mkdir -p /output/chrony
      dpkg-deb -R /tmp/chrony_*.deb /output/chrony

      ORIG_VER=$(dpkg-deb -f /tmp/chrony_*.deb Version)
      ARCH=$(dpkg-deb -f /tmp/chrony_*.deb Architecture)

      cp -r "${SAVE_PWD}"/workflows/bootc-debs-builder/chronypostinstall/* \
        /output/chrony/

      # Regenerate md5sums after content modification
      find /output/chrony -not -path '*/DEBIAN/*' -type f \
        | xargs md5sum \
        | sed "s|/output/chrony/||" \
        > /output/chrony/DEBIAN/md5sums

      sed -i "s/^Version: .*/Version: 1:${ORIG_VER}+bootc2/" \
        /output/chrony/DEBIAN/control

      # Content check: version rewritten in control.
      grep -qF "Version: 1:${ORIG_VER}+bootc2" \
        /output/chrony/DEBIAN/control \
        || { echo "ERROR: chrony version not rewritten" >&2; exit 1; }

      dpkg-deb --build /output/chrony \
        /debs/chrony_${ORIG_VER}+bootc2_${ARCH}.deb

  - name: openipmi
    upstream: openipmi
