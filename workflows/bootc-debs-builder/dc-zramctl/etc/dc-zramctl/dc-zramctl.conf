# zramctl — adaptive, calibrated zram swap. This host uses zram-only swap.
#
# Every memory limit here is a PERCENTAGE of the machine's physical RAM, resolved
# at runtime from /proc/meminfo — never a generic absolute value — so the same
# policy fits a 4 GiB host and a 512 GiB host. The per-device increment (how much
# a hot-added zram device holds) is NOT set here: it comes from the calibration
# (the profitability curve), which measures this host's compression ratio and CPU
# cost.

# Hard ceiling on the physical RAM all zram devices may consume together, as a
# percent of total RAM. Enforced per device via the kernel's mem_limit, so it can
# never be exceeded: worst case a zram write fails and the normal OOM path runs —
# never worse than a host with no zram at all.
physical_cap_percent=25

# Memory-pressure thresholds, read from PSI (/proc/pressure/memory, "some" avg10,
# a percentage 0-100): grow when sustained above high, shrink when below low.
pressure_high=15
pressure_low=1

# Timing (seconds): poll interval, how long pressure must persist before acting
# (hysteresis), and the minimum gap between two grow/shrink actions (cooldown).
interval=5
hysteresis=10
cooldown=30

# Upper bound on the number of concurrent zram devices (a safety stop; the
# physical cap is the real limit).
max_devices=16

# Recalibrate when the live compression ratio deviates from the calibrated value
# by more than this percent, sustained — this catches environmental drift such as
# a heatwave thermally throttling the cores and slowing compression. Rate-limited
# by recal_min_gap (seconds) so pressure cannot force back-to-back recalibrations.
drift_percent=25
recal_min_gap=3600
