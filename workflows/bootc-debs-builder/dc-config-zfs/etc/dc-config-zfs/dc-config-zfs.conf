# Target ZFS dataset for the Proxmox VE cluster config (pmxcfs).
#
# When set, dc-config-zfs relocates /var/lib/pve-cluster onto this dataset and
# mounts it there before pve-cluster starts, so the config (which backs /etc/pve)
# survives disk failure and OS reinstalls. Leave empty to disable (default).
#
# Create/enable it once with:  dc-config-zfs enable <pool/dataset>
# Example:
# DATASET=rpool/pmxcfs
DATASET=
