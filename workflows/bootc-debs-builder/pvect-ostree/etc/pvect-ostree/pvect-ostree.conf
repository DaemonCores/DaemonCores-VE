# pvect-ostree configuration — sourced by /usr/sbin/pvect-ostree.
# Values here are defaults; every one can be overridden per invocation.

# ostree sysroot that holds the composefs deployments (persistent, machine-local).
SYSROOT=/var/lib/pvect-ostree/sysroot

# Per-container writable state (writable /etc and /var overlays live here).
STATE_DIR=/var/lib/pvect-ostree/cts

# PVE storage (type dir) that backs the container rootfs subvols. Must have
# 'content rootdir'. The composefs view is mounted onto the subvol PVE allocates.
STORAGE=local

# PVE unprivileged default id-map. Do not change unless your CTs use a custom map.
UID_BASE=100000
UID_RANGE=65536

# Pinned user-namespace file used by `mount.composefs -o idmap=` (re-pinned on boot).
USERNS=/run/pvect-ostree/userns

# Fallback OCI/bootc template used only to make `pct create` allocate the rootfs
# subvol; its extracted content is discarded and replaced by the composefs view.
ALLOC_TEMPLATE_MATCH=alpine

# systemd units that belong to a host OS but not to a container guest; masked in
# the per-container writable /etc so the guest boots clean (no [FAILED]).
GUEST_MASK_UNITS="networking.service ifupdown2-pre.service dhcpcd.service \
wpa_supplicant.service systemd-networkd.service NetworkManager.service \
apparmor.service bootloader-update.service \
sys-kernel-config.mount sys-kernel-debug.mount"
