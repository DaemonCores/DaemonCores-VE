# /etc/fanctl/fanctl.conf — fan controller configuration.
# Sourced by bash: VAR=value assignments only.
# Every value below is the built-in default; uncomment to override.
# The calibration result is stored separately in /var/lib/fanctl/calibration.conf.

# ipmitool binary (local IPMI access via /dev/ipmi0). Server BMCs.
#IPMITOOL=ipmitool

# ectool binary: fan control through a ChromeOS/Framework Embedded Controller,
# used automatically when there is neither an IPMI BMC nor a writable hwmon PWM.
# Not shipped on Debian/Proxmox; install fw-ectool if the host has such an EC.
#ECTOOL=ectool

# Seconds between control cycles.
#POLL_INTERVAL=20

# Fan speed bounds, percent. MIN_PCT keeps a baseline airflow for components
# with no sensor in the loop (VRM, RAID controller, NICs, disks). Do not set 0.
#MIN_PCT=10
#MAX_PCT=100

# --- Per-component targets (how the curve is driven) ------------------------
# TARGET, anti-yoyo DEADBAND, RECAL threshold, longevity KNEE and survival Tjmax
# are per component class, baked in as sourced values in classify_sensor() inside
# the script: cool-preferring parts (CPU, GPU, VRM, RAM, battery) aim low; warm-
# preferring parts (SSD, HDD) aim higher; volatile parts get a wider deadband. The
# auto-calibrated fan curve tracks, in real time, the component furthest above its
# own target, and holds steady within its DEADBAND (no yoyo). KNEE is a bare fan
# bypass (T >= knee -> 100%, no margin); SURVIVAL drives the escalation below.
#
# Calibration measures the response by its DERIVATIVE (rise/fall/hold over a
# window), not a single instant, and records the lowest fan speed that keeps the
# volatile part stable -- the constant idle floor, so the box does not oscillate.
#STABLE_BAND=2
#
# Fallback for a sensor whose name is not in the table but which declares a high
# critical of its own (generic server sensors like "Temp"): regulated toward
# GENERIC_TARGET with its own crit as the bypass (historical behaviour). Below
# GENERIC_CRIT_MIN an unclassified sensor is bypass-only.
#GENERIC_TARGET=60
#GENERIC_DEADBAND=8
#GENERIC_RECAL=12
#GENERIC_CRIT_MIN=80

# --- Last-resort thermal escalation (deg C ABOVE a component's survival Tjmax) --
# Fans are already at 100% (knee) well before this. These fire only if temperature
# keeps climbing past the hardware limit -- i.e. cooling has truly failed. Keyed
# off the survival crit, never the longevity knee, so a normal load spike never
# powers off. Set very high to disable.
#CRIT_SURVIVE_NOTIFY=5   # +5  -> warn every user to save now.
#CRIT_SURVIVE_SOFT=8     # +8  -> clean poweroff.
#CRIT_SURVIVE_HARD=12    # +12 -> violent instant power cut (SysRq o, no sync).

# Physical plausibility window for any reading OR threshold, deg C. A value outside
# it is a phantom/stuck/unpopulated sensor and never drives control. 150 is the
# market-wide legitimate ceiling (VRM MOSFET Tjmax); -40 the industrial low.
#TEMP_SANE_MIN=-40
#TEMP_SANE_MAX=150

# Regex for the inlet-air sensor (reference only, never controlled).
#AMBIENT_MATCH='Inlet|Ambient'

# Anti-oscillation: minimum percent change before issuing a command.
#HYST_PCT=3

# Maximum fan change per cycle while holding (bounds the integral tracking).
#TRIM_MAX=4

# Consecutive IPMI read failures before reverting to BMC automatic.
#MAX_FAIL=3

# 1 = exit when the IPMI vendor is unsupported; 0 = monitor mode (read-only).
#REQUIRE_KNOWN_VENDOR=0

# --- Calibration and drift tuning ------------------------------------------
# We are at the optimal target within +/- DEADBAND (never perfect), deg C.
#DEADBAND=3

# |target error| beyond which the curve is wrong -> recalibrate, deg C.
#DRIFT=8
#DRIFT_CYCLES=5

# Inlet-air change vs the last calibration that triggers a recalibration.
#INLET_DRIFT=5

# Settle time after each fan change while calibrating, seconds.
#STABILIZE_SECS=40

# Convergence bounds.
#MAX_CAL_STEPS=10
#CAL_STEP_MIN=2
#CAL_STEP_MAX=12

# Fallback proportional gain when no slope is measured yet, percent per deg C.
#DEFAULT_GAIN=3
