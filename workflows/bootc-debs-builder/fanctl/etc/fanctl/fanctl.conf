# /etc/fanctl/fanctl.conf — fan controller configuration.
# Sourced by bash: VAR=value assignments only.
# Every value below is the built-in default; uncomment to override.

# ipmitool binary (local IPMI access via /dev/ipmi0).
#IPMITOOL=ipmitool

# Seconds between regulation cycles.
#POLL_INTERVAL=15

# Fan speed bounds, percent.
#MIN_PCT=20
#MAX_PCT=100

# Bottom of the curve: idle temperature, degrees C.
#BASE_TEMP=35

# Top of the curve = sensor Upper-Critical minus SAFETY_MARGIN, degrees C.
#SAFETY_MARGIN=15

# Hard failsafe: revert to BMC automatic at Upper-Critical minus HARD_MARGIN.
#HARD_MARGIN=8

# Anti-oscillation: minimum percent change before issuing a command.
#HYST_PCT=4

# Upper-Critical (deg C) above which a sensor is treated as CPU-class.
#CONTROL_UCR_MIN=80

# Regex for the inlet-air sensor used as a secondary thermal guard.
#AMBIENT_MATCH='Inlet|Ambient'

# Failed fan: 0 = revert to BMC automatic (safe); 1 = keep regulating degraded.
#ALLOW_DEGRADED=0
#DEGRADED_MIN_PCT=40

# Consecutive IPMI read failures before reverting to BMC automatic.
#MAX_FAIL=3

# 1 = exit when the vendor is unsupported; 0 = monitor mode (read-only).
#REQUIRE_KNOWN_VENDOR=0
