# openresolv configuration for the DaemonCores VE DNS chain.
#
# The host runs dnsmasq as a local caching resolver. The desired chain is:
#   system  ->  127.0.0.1 (dnsmasq)  ->  upstream DNS from /etc/network/interfaces
#
# resolv_conf: the system resolver file. openresolv detects the local dnsmasq
# resolver (127.0.0.1) and writes only that here, omitting the upstream servers,
# so the host always queries dnsmasq.
resolv_conf=/etc/resolv.conf
#
# dnsmasq_resolv: openresolv writes the upstream nameservers collected from the
# interface `dns-nameservers` (in /etc/network/interfaces) here, excluding the
# local 127.0.0.1 entry. dnsmasq reads this file via `resolv-file` in
# /etc/dnsmasq.conf and forwards to those servers. Without this line openresolv's
# dnsmasq subscriber is a no-op, dnsmasq falls back to /etc/resolv.conf
# (= 127.0.0.1) and loops back on itself instead of forwarding upstream.
dnsmasq_resolv=/run/dnsmasq/resolv.conf
