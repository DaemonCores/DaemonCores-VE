# The onboard Matrox G200 (mgag200) on Dell servers has no attached monitor when
# the machine is headless, so the DRM connector poll re-reads a garbage EDID
# every ~10 s and floods the kernel log with "EDID block 0 checksum is invalid".
# Disable connector polling — hotplug detection is irrelevant on a server, and
# the initial (non-repeating) EDID read still happens.
options drm_kms_helper poll=0
