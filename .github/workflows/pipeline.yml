name: Full Pipeline

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 5 1 * *'
  workflow_dispatch:
    inputs:
      update_base:
        description: 'Rebuild debian-bootc base image first (triggers its pipeline and waits)'
        type: boolean
        default: false
      rebuild_env:
        description: 'Rebuild the :buildenv toolchain image first (needed once to seed it, or after editing env.yml)'
        type: boolean
        default: false
      run_debs:
        description: 'Build .deb packages'
        type: boolean
        default: true
      run_iso:
        description: 'Build ISO'
        type: boolean
        default: true
      run_image:
        description: 'Build container image'
        type: boolean
        default: true

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write
  issues: write

jobs:
  meta:
      name: Compute product name
      runs-on: ubuntu-latest
      outputs:
        product_name: ${{ steps.name.outputs.product_name }}
      steps:
        - id: name
          run: |
            name="${GITHUB_REPOSITORY##*/}"   # cut at the slash -> repo name
            name="${name//-/ }"               # replace dashes with spaces
            echo "product_name=$name" >> "$GITHUB_OUTPUT"

  base:
    name: Rebuild debian-bootc base first
    # Optional: only when the checkbox is ticked on manual dispatch. Rebuilds
    # the upstream base image so the Proxmox image below builds on top of a
    # fresh base. If this fails, the downstream jobs are skipped (they gate on
    # base success/skipped), so the run goes red instead of shipping on a
    # stale base.
    if: ${{ inputs.update_base }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger debian-bootc pipeline and wait
        uses: DaemonCores/DaemonCores-CI/trigger-pipeline@main
        with:
          repo: DaemonCores/debian-bootc
          workflow: pipeline.yml
          ref: main
          # PAT with Actions read+write on debian-bootc (GITHUB_TOKEN cannot
          # dispatch cross-repo). Add it as a repo/org secret.
          token: ${{ secrets.PAT_DISPATCH }}

  build_env:
    name: Rebuild the deb-builder env image
    # Monthly (schedule) or on demand via the checkbox. Dev runs otherwise reuse
    # the cached :buildenv image (zero setup time).
    if: ${{ github.event_name == 'schedule' || inputs.rebuild_env }}
    uses: DaemonCores/DaemonCores-CI/.github/workflows/build-env.yml@main
    secrets: inherit

  debs:
    name: Build .deb packages
    needs: [base, build_env]
    # always() lets debs run even when base/build_env were skipped (dev runs).
    if: |
      always() &&
      (github.event_name == 'schedule' || inputs.run_debs) &&
      (needs.base.result == 'success' || needs.base.result == 'skipped') &&
      (needs.build_env.result == 'success' || needs.build_env.result == 'skipped')
    uses: ./.github/workflows/bootc-debs-builder.yml
    secrets: inherit

  image:
    name: Build container image
    needs: [debs, base]
    # always() forces evaluation even when the debs/base jobs were skipped.
    # image runs if: checked AND (base ok OR skipped) AND (debs ok OR skipped).
    if: |
      always() &&
      (github.event_name == 'schedule' || inputs.run_image) &&
      (needs.base.result == 'success' || needs.base.result == 'skipped') &&
      (needs.debs.result == 'success' || needs.debs.result == 'skipped')
    uses: DaemonCores/DaemonCores-CI/.github/workflows/bootc-build.yml@main
    with:
      # Force a no-cache image rebuild when at least one .deb was rebuilt
      # (schedule already forces no-cache inside bootc-build.yml).
      force_no_cache: ${{ needs.debs.outputs.any_rebuilt == 'true' }}
    secrets: inherit

  iso:
    name: Build ISO
    needs: [debs, image, meta, base]
    # always() forces evaluation even when debs, image or base were skipped.
    # iso runs if: checked AND (base ok OR skipped) AND (debs ok OR skipped)
    # AND (image ok OR skipped).
    if: |
      always() &&
      (github.event_name == 'schedule' || inputs.run_iso) &&
      (needs.base.result == 'success' || needs.base.result == 'skipped') &&
      (needs.debs.result == 'success' || needs.debs.result == 'skipped') &&
      (needs.image.result == 'success' || needs.image.result == 'skipped') &&
      needs.meta.result == 'success'
    uses: DaemonCores/DaemonCores-CI/.github/workflows/iso-builder.yml@main
    with:
      product_name: ${{ needs.meta.outputs.product_name }}
    secrets: inherit