name: Build & Publish Bootc .deb

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:trixie

    steps:
      - name: Install clone deps
        shell: bash
        run: |
          apt update
          apt install -y \
            ca-certificates \
            openssl \
            git \
            curl \
            wget

      - name: Checkout
        uses: actions/checkout@v7 
        with:
          submodules: recursive
      
      - name: Prepare environement
        shell: bash
        run: |
          cp -r ./workflows/bootc-debs-builder/preinstall/* /
          mkdir -p /{build,debs}

      - name: Install build deps
        shell: bash
        env:
          CARGO_HOME: "/build/rust"
          RUSTUP_HOME: "/build/rust"
          PVE_GPG_SHA256: 136673be77aba35dcce385b28737689ad64fd785a797e57897589aed08db6e45
        run: |
          curl -fsSL https://enterprise.proxmox.com/debian/proxmox-archive-keyring-trixie.gpg \
            -o /usr/share/keyrings/proxmox-archive-keyring.gpg
          printf '%s  /usr/share/keyrings/proxmox-archive-keyring.gpg\n' "${PVE_GPG_SHA256}" \
            | sha256sum -c -

          apt update
          apt install -y \
            zstd \
            make \
            build-essential \
            go-md2man \
            libzstd-dev \
            pkgconf \
            autoconf \
            automake \
            libtool \
            libglib2.0-dev \
            libcurl4-openssl-dev \
            libgpgme-dev \
            libarchive-dev \
            libmount-dev \
            libfuse3-dev \
            libssl-dev \
            libsystemd-dev \
            gobject-introspection \
            libgirepository1.0-dev \
            libsoup-3.0-dev \
            bison \
            gperf \
            flex \
            gettext \
            python3 \
            autopoint \
            gawk \
            meson \
            ninja-build \
            libfreetype6-dev \
            sbsigntool

          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- --profile minimal -y

      - name: Repack ifupdown2 from Proxmox with bootc fix
        shell: bash
        run: |
          SAVE_PWD=$(pwd)

          apt update
          cd /tmp
          apt-get download ifupdown2

          mkdir -p /output/ifupdown2
          dpkg-deb -R /tmp/ifupdown2_*.deb /output/ifupdown2

          ORIG_VER=$(dpkg-deb -f /tmp/ifupdown2_*.deb Version)

          cp -r "${SAVE_PWD}"/workflows/bootc-debs-builder/ifupdown2postinstall/* \
            /output/ifupdown2/

          # Regenerate md5sums after content modification
          find /output/ifupdown2 -not -path '*/DEBIAN/*' -type f \
            | xargs md5sum \
            | sed "s|/output/ifupdown2/||" \
            > /output/ifupdown2/DEBIAN/md5sums

          # Preserve +pmx suffix for pve-manager version check
          sed -i "s/^Version: .*/Version: 1:${ORIG_VER}+bootc4/" \
            /output/ifupdown2/DEBIAN/control
          chmod +x /output/ifupdown2/usr/sbin/ifupdown2-autoconf \
            /output/ifupdown2/usr/sbin/pve-domain-set

          dpkg-deb --build /output/ifupdown2 \
            /debs/ifupdown2_${ORIG_VER}+bootc4_all.deb

      - name: Repack chrony with bootc fix
        shell: bash
        run: |
          SAVE_PWD=$(pwd)

          apt update
          cd /tmp
          apt-get download chrony

          mkdir -p /output/chrony
          dpkg-deb -R /tmp/chrony_*.deb /output/chrony

          ORIG_VER=$(dpkg-deb -f /tmp/chrony_*.deb Version)
          ARCH=$(dpkg-deb -f /tmp/chrony_*.deb Architecture)

          cp -r "${SAVE_PWD}"/workflows/bootc-debs-builder/chronypostinstall/* \
            /output/chrony/

          # Regenerate md5sums after content modification
          find /output/chrony -not -path '*/DEBIAN/*' -type f \
            | xargs md5sum \
            | sed "s|/output/chrony/||" \
            > /output/chrony/DEBIAN/md5sums

          sed -i "s/^Version: .*/Version: 1:${ORIG_VER}+bootc2/" \
            /output/chrony/DEBIAN/control

          dpkg-deb --build /output/chrony \
            /debs/chrony_${ORIG_VER}+bootc2_${ARCH}.deb

      - name: Repack openipmi with no-IPMI skip
        shell: bash
        run: |
          SAVE_PWD=$(pwd)

          apt update
          cd /tmp
          apt-get download openipmi

          mkdir -p /output/openipmi
          dpkg-deb -R /tmp/openipmi_*.deb /output/openipmi

          ORIG_VER=$(dpkg-deb -f /tmp/openipmi_*.deb Version)
          ARCH=$(dpkg-deb -f /tmp/openipmi_*.deb Architecture)

          cp -r "${SAVE_PWD}"/workflows/bootc-debs-builder/openipmipostinstall/* \
            /output/openipmi/

          # Regenerate md5sums after content modification
          find /output/openipmi -not -path '*/DEBIAN/*' -type f \
            | xargs md5sum \
            | sed "s|/output/openipmi/||" \
            > /output/openipmi/DEBIAN/md5sums

          sed -i "s/^Version: .*/Version: 1:${ORIG_VER}+bootc1/" \
            /output/openipmi/DEBIAN/control

          dpkg-deb --build /output/openipmi \
            /debs/openipmi_${ORIG_VER}+bootc1_${ARCH}.deb

      - name: Repack libtemplate-perl with ostree mtime fix
        shell: bash
        run: |
          apt update
          cd /tmp
          apt-get download libtemplate-perl

          mkdir -p /output/libtemplate-perl
          dpkg-deb -R /tmp/libtemplate-perl_*.deb /output/libtemplate-perl

          ORIG_VER=$(dpkg-deb -f /tmp/libtemplate-perl_*.deb Version)
          ARCH=$(dpkg-deb -f /tmp/libtemplate-perl_*.deb Architecture)

          # ostree canonicalizes every /usr file mtime to 0 (epoch) at deploy
          # time. Template Toolkit's _template_modified returns that mtime and
          # its caller uses the value as the "does this template exist?" truth:
          # a zero mtime is falsy, so every template shipped under /usr is
          # reported missing and the Proxmox VE web UI answers HTTP 500
          # ("index.html.tpl: not found"). Map a real-but-zero mtime to 1
          # (truthy and stable, so the freshness cache never thrashes) while
          # still returning undef for genuinely absent files.
          PROV=$(find /output/libtemplate-perl -path '*/Template/Provider.pm')
          grep -qF 'return (stat( $template ))[9];' "$PROV" \
            || { echo "ERROR: libtemplate-perl _template_modified changed upstream; patch needs review." >&2; exit 1; }
          sed -i 's#return (stat( $template ))\[9\];#my @arr = stat($template); return @arr ? ($arr[9] || 1) : undef;#' "$PROV"
          grep -qF 'my @arr = stat($template); return @arr ? ($arr[9] || 1) : undef;' "$PROV" \
            || { echo "ERROR: libtemplate-perl mtime patch failed to apply." >&2; exit 1; }
          # Compile-check the patched module. The package is only extracted here,
          # not installed, so add its own tree to @INC to resolve the sibling
          # Template::* modules (e.g. Template::Base) it inherits from.
          perl -I "$(dirname "$(dirname "$PROV")")" -c "$PROV" \
            || { echo "ERROR: patched Provider.pm fails perl -c." >&2; exit 1; }

          # Regenerate md5sums after content modification
          find /output/libtemplate-perl -not -path '*/DEBIAN/*' -type f \
            | xargs md5sum \
            | sed "s|/output/libtemplate-perl/||" \
            > /output/libtemplate-perl/DEBIAN/md5sums

          sed -i "s/^Version: .*/Version: 1:${ORIG_VER}+bootc1/" \
            /output/libtemplate-perl/DEBIAN/control

          dpkg-deb --build /output/libtemplate-perl \
            /debs/libtemplate-perl_${ORIG_VER}+bootc1_${ARCH}.deb

      - name: Repack pve-manager without the subscription-notice popup
        shell: bash
        run: |
          apt update
          cd /tmp
          apt-get download pve-manager

          mkdir -p /output/pve-manager
          dpkg-deb -R /tmp/pve-manager_*.deb /output/pve-manager

          ORIG_VER=$(dpkg-deb -f /tmp/pve-manager_*.deb Version)
          ARCH=$(dpkg-deb -f /tmp/pve-manager_*.deb Architecture)

          # This image ships without a Proxmox VE Enterprise subscription, so the
          # subscription API reports status "notfound" and the web UI shows a
          # "No valid subscription" dialog on every login. Flip that single
          # status field to "active" so the popup never appears. This folds the
          # patch into the image build the same way as the other repacked
          # packages, replacing the former removepvepopup script and its apt
          # Post-Invoke hook. Buying a Proxmox VE Support Subscription is the
          # supported alternative and also removes the popup; revert this if you
          # switch to a paid subscription.
          SUB=/output/pve-manager/usr/share/perl5/PVE/API2/Subscription.pm
          grep -qF 'status => "notfound",' "$SUB" \
            || { echo "ERROR: pve-manager Subscription.pm changed upstream; patch needs review." >&2; exit 1; }
          sed -i 's/status => "notfound",/status => "active",/g' "$SUB"

          # Regenerate md5sums after content modification
          find /output/pve-manager -not -path '*/DEBIAN/*' -type f \
            | xargs md5sum \
            | sed "s|/output/pve-manager/||" \
            > /output/pve-manager/DEBIAN/md5sums

          sed -i "s/^Version: .*/Version: 1:${ORIG_VER}+bootc1/" \
            /output/pve-manager/DEBIAN/control

          dpkg-deb --build /output/pve-manager \
            /debs/pve-manager_${ORIG_VER}+bootc1_${ARCH}.deb

      - name: Build fanctl
        shell: bash
        env:
          FANCTL_VER: "1.2.1"
        run: |
          SAVE_PWD=$(pwd)

          mkdir -p /output/fanctl
          cp -r "${SAVE_PWD}"/workflows/bootc-debs-builder/fanctl/* /output/fanctl/

          chmod 0755 /output/fanctl/usr/sbin/fanctl
          chmod 0755 /output/fanctl/DEBIAN/postinst

          sed -i \
            -e "s|{{ VER }}|${FANCTL_VER}|g" \
            -e "s|, {{ DEPS }}||g" \
            /output/fanctl/DEBIAN/control

          dpkg-deb --build /output/fanctl \
            /debs/fanctl_${FANCTL_VER}_all.deb

      - name: Build powerctl
        shell: bash
        env:
          POWERCTL_VER: "1.1.0"
        run: |
          SAVE_PWD=$(pwd)

          mkdir -p /output/powerctl
          cp -r "${SAVE_PWD}"/workflows/bootc-debs-builder/powerctl/* /output/powerctl/

          chmod 0755 /output/powerctl/usr/sbin/powerctl
          chmod 0755 /output/powerctl/DEBIAN/postinst

          sed -i \
            -e "s|{{ VER }}|${POWERCTL_VER}|g" \
            -e "s|, {{ DEPS }}||g" \
            /output/powerctl/DEBIAN/control

          dpkg-deb --build /output/powerctl \
            /debs/powerctl_${POWERCTL_VER}_all.deb

      - name: Upload debs
        uses: actions/upload-artifact@v7
        with:
          name: debs
          path: /debs/*.deb

  publish:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:

      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: debs
          path: debs/

      - name: Create APT repo
        id: create-apt-repo
        uses: morph027/apt-repo-action@v3
        with:
          repo-name: proxmox-atomic
          signing-key: ${{ secrets.APT_GPG_KEY }}
          codename: trixie
          components: main
          architectures: amd64

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ steps.create-apt-repo.outputs.dir }}

      # GitHub Pages deployments fail intermittently with "Deployment failed,
      # try again later." due to transient issues on the Pages service side
      # (see actions/deploy-pages issues #406 and #418). The error occurs
      # immediately after deployment creation, before any syncing status, and
      # is not caused by artifact conflicts, size, or workflow configuration.
      # Retrying within the same run (after a short backoff) reliably succeeds.
      - name: Deploy to GitHub Pages (attempt 1/3)
        id: deploy_1
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Wait before retry 2
        if: steps.deploy_1.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages (attempt 2/3)
        id: deploy_2
        if: steps.deploy_1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Wait before retry 3
        if: steps.deploy_1.outcome == 'failure' && steps.deploy_2.outcome == 'failure'
        run: sleep 60

      - name: Deploy to GitHub Pages (attempt 3/3)
        id: deploy_3
        if: steps.deploy_1.outcome == 'failure' && steps.deploy_2.outcome == 'failure'
        uses: actions/deploy-pages@v5

      - name: Fail job if all deploy attempts failed
        if: steps.deploy_1.outcome == 'failure' && steps.deploy_2.outcome == 'failure' && steps.deploy_3.outcome == 'failure'
        run: |
          echo "::error::All 3 GitHub Pages deploy attempts failed. This is a transient issue on the GitHub Pages service side; re-run the workflow later."
          exit 1